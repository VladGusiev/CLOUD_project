apiVersion: v1
kind: ServiceAccount
metadata:
  name: scaler-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scaler-sa-pod-reader
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scaler-sa-pod-reader-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: scaler-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scaler-sa-pod-reader
