apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-balancer
  labels:
    app: load-balancer
    component: lb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-balancer
  template:
    metadata:
      labels:
        app: load-balancer
        component: lb
    spec:
      serviceAccountName: scaler-sa
      containers:
        - name: lb
          image: house-lb:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_LABELS
              value: "sensor-temperature,sensor-humidity,sensor-energy,sensor-air-quality"
            - name: SYNC_INTERVAL
              value: "5"
            - name: LB_PORT
              value: "8080"
            - name: K8S_NAMESPACE
              value: "default"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: load-balancer
  labels:
    app: load-balancer
spec:
  type: NodePort
  selector:
    app: load-balancer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
