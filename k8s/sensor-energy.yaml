apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-energy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensor-energy
  template:
    metadata:
      labels:
        app: sensor-energy
        component: sensor
    spec:
      containers:
        - name: sensor
          image: house-sensor:latest
          imagePullPolicy: Never
          env:
            - name: SENSOR_TYPE
              value: energy
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sensor-energy-svc
spec:
  selector:
    app: sensor-energy
  ports:
    - port: 8080
      targetPort: 8080
